<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carros de Luxo🚗</title>

  <style>
    body{
      height: 100vh;
      margin: 0;

      background:
        linear-gradient(rgba(46,45,45,0.65), rgba(0,0,0,0.8)),
        url("carros de luxo.png");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card{
      text-align: center;
      background: rgba(0,0,0,.5);
      padding: 40px;
      border-radius: 20px;
      color: white;
      backdrop-filter: blur(10px);
    }

    button{
      padding: 12px 30px;
      border: none;
      border-radius: 10px;
      background: #ffc107;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Carros de Luxo</h1>
    <p>Os supercarros mais incríveis do mundo 🚗🔥</p>
     <a href="carros.html">
        <button>Entrar</button>
    </a>
  </div>

</body>
</html>
