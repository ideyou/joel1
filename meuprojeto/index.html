<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Joel Flávio | Messi</title>

  <link rel="stylesheet"
  href="kkk.jpg">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;

      background:
      linear-gradient(rgba(0,0,0,0.65),
      rgba(0,0,0,0.8)),

      url('kkk.jpg');

      background-size:cover;
      background-position:center;

      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .container{

      width:380px;

      background:rgba(0,0,0,0.45);

      border:1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(12px);

      border-radius:25px;

      padding:35px;

      text-align:center;

      box-shadow:0 0 40px rgba(0,0,0,0.7);

      animation:entrada 1s ease;
    }

    @keyframes entrada{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    .avatar{

      width:130px;
      height:130px;

      border-radius:50%;

      border:4px solid #00e5ff;

      object-fit:cover;

      box-shadow:0 0 25px #00e5ff;

      margin-bottom:15px;
    }

    h1{
      color:white;
      font-size:34px;
      margin-bottom:5px;
    }

    .subtitle{
      color:#00e5ff;
      margin-bottom:30px;
      font-size:18px;
    }

    .links{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .btn{

      text-decoration:none;

      padding:15px;

      border-radius:14px;

      color:white;

      font-weight:bold;

      transition:0.4s;

      font-size:17px;

      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .instagram{
      background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045);
    }

    .youtube{
      background:#ff0000;
    }

    .github{
      background:#24292e;
    }

    .wikipedia{
      background:#1e88e5;
    }

    .btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 20px rgba(255,255,255,0.3);
    }

    .footer{
      margin-top:30px;
      color:#ccc;
      font-size:14px;
    }

  </style>

</head>

<body>

  <div class="container">

    <img src="profile.jpg" class="avatar">

    <h1>Joel Flávio</h1>

    <p class="subtitle">
      Fã do Lionel Messi ⚽🐐
    </p>

    <div class="links">

      <a href="https://www.instagram.com/leomessi/"
      target="_blank"
      class="btn instagram">

        <i class="fa-brands fa-instagram"></i>
        Instagram do Messi

      </a>

      <a href="https://www.youtube.com/@LeoMessi10i"
      target="_blank"
      class="btn youtube">

        <i class="fa-brands fa-youtube"></i>
        Melhores Gols

      </a>

      <a href="https://pt.wikipedia.org/wiki/Lionel_Messi"
      target="_blank"
      class="btn wikipedia">

        <i class="fa-solid fa-book"></i>
        História do Messi

      </a>

      <a href="https://github.com/"
      target="_blank"
      class="btn github">

        <i class="fa-brands fa-github"></i>
        Meu GitHub

      </a>

    </div>

    <div class="footer">
      ⚡ Projeto inspirado em Lionel Messi
    </div>

  </div>

</body>

</html>
